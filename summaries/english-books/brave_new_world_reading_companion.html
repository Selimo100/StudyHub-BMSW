<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Brave New World — Reading Companion</title>
    <style>
      :root {
        --bg: #f6f1e7;
        --panel: #fffdf8;
        --ink: #2b2620;
        --ink-soft: #5c554a;
        --accent: #8a3b2e;
        --accent-soft: #c98a63;
        --line: #e3d9c6;
        --green: #4d6b53;
        --chip: #efe4cd;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Georgia", "Iowan Old Style", serif;
        background: var(--bg);
        color: var(--ink);
      }
      #app {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      #sidebar {
        width: 260px;
        flex-shrink: 0;
        background: #2b2620;
        color: #eee3cf;
        padding: 20px 14px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
      }
      #sidebar h1 {
        font-size: 17px;
        margin: 0 0 2px 4px;
        color: #fff;
        line-height: 1.3;
      }
      #sidebar .subtitle {
        font-size: 11px;
        color: #c9b998;
        margin: 0 0 16px 4px;
        font-style: italic;
      }
      .progress-wrap {
        margin: 0 4px 18px 4px;
      }
      .progress-bar-outer {
        background: #463f34;
        border-radius: 8px;
        height: 8px;
        overflow: hidden;
      }
      .progress-bar-inner {
        background: var(--accent-soft);
        height: 100%;
        transition: width 0.3s ease;
      }
      .progress-label {
        font-size: 11px;
        color: #c9b998;
        margin-top: 5px;
      }
      .nav-section-title {
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #8a8069;
        margin: 14px 8px 4px 8px;
      }
      .nav-btn {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        background: none;
        border: none;
        color: #eee3cf;
        text-align: left;
        font-family: inherit;
        font-size: 13.5px;
        padding: 7px 8px;
        border-radius: 6px;
        cursor: pointer;
        width: 100%;
      }
      .nav-btn:hover {
        background: #3a3327;
      }
      .nav-btn.active {
        background: var(--accent);
        color: #fff;
      }
      .nav-btn .tick {
        font-size: 11px;
        color: #8bb894;
        flex-shrink: 0;
      }
      .nav-btn.active .tick {
        color: #d7ffe0;
      }
      #sidebar .footer-btns {
        margin-top: auto;
        padding-top: 14px;
        border-top: 1px solid #463f34;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      #sidebar .footer-btns button {
        background: #3a3327;
        color: #eee3cf;
        border: 1px solid #55493a;
        border-radius: 6px;
        padding: 7px 8px;
        font-family: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      #sidebar .footer-btns button:hover {
        background: #463f34;
      }
      #save-indicator {
        font-size: 10px;
        color: #8bb894;
        text-align: center;
        margin-top: 4px;
        min-height: 14px;
      }

      /* Main content */
      #content {
        flex: 1;
        padding: 36px 44px 80px 44px;
        max-width: 900px;
      }
      h2.page-title {
        font-size: 26px;
        margin: 0 0 4px 0;
        color: var(--ink);
      }
      .page-sub {
        color: var(--ink-soft);
        font-size: 14px;
        margin: 0 0 26px 0;
        font-style: italic;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 20px 22px;
        margin-bottom: 18px;
      }
      .card h3 {
        margin: 0 0 10px 0;
        font-size: 15px;
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      details.recap {
        background: #fbf6ea;
        border: 1px dashed var(--accent-soft);
        border-radius: 8px;
        padding: 10px 14px;
        margin-bottom: 18px;
      }
      details.recap summary {
        cursor: pointer;
        font-weight: bold;
        color: var(--accent);
        font-size: 14px;
      }
      details.recap p {
        font-size: 14.5px;
        line-height: 1.6;
        color: var(--ink-soft);
      }
      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 0 0 18px 0;
      }
      .tag {
        background: var(--chip);
        color: #5a4a2f;
        font-size: 11.5px;
        padding: 4px 10px;
        border-radius: 20px;
        font-family: Arial, sans-serif;
      }
      .tag.char {
        background: #e6ecdf;
        color: var(--green);
      }
      .q-block {
        margin-bottom: 20px;
      }
      .q-block label {
        display: block;
        font-size: 14.5px;
        line-height: 1.5;
        margin-bottom: 6px;
        color: var(--ink);
      }
      .q-hint {
        font-size: 12px;
        color: #a0906f;
        font-style: italic;
        margin-bottom: 6px;
      }
      textarea,
      input[type="text"] {
        width: 100%;
        font-family: "Iowan Old Style", Georgia, serif;
        font-size: 14px;
        padding: 9px 11px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fffefb;
        color: var(--ink);
        resize: vertical;
      }
      textarea {
        min-height: 64px;
      }
      .quote-row {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
        background: #fffefb;
      }
      .quote-row textarea {
        min-height: 44px;
        margin-bottom: 6px;
      }
      .quote-row .meta-row {
        display: flex;
        gap: 8px;
      }
      .quote-row .meta-row input {
        flex: 1;
      }
      .vocab-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
      }
      .vocab-row input {
        flex: 1;
      }
      .small-btn {
        font-family: Arial, sans-serif;
        font-size: 12px;
        background: var(--chip);
        color: #5a4a2f;
        border: none;
        border-radius: 6px;
        padding: 7px 12px;
        cursor: pointer;
      }
      .small-btn:hover {
        background: #e3d3ac;
      }
      .remove-btn {
        background: #f3e0dc;
        color: var(--accent);
        border: none;
        border-radius: 6px;
        padding: 0 10px;
        cursor: pointer;
        font-family: Arial, sans-serif;
        font-size: 12px;
      }
      .chapter-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 26px;
        gap: 10px;
        flex-wrap: wrap;
      }
      .done-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        cursor: pointer;
        background: #eef4ec;
        border: 1px solid #cfe0cc;
        padding: 9px 16px;
        border-radius: 8px;
        color: var(--green);
        font-family: Arial, sans-serif;
      }
      .done-toggle input {
        transform: scale(1.2);
      }
      .nav-buttons {
        display: flex;
        gap: 8px;
      }
      .nav-buttons button {
        font-family: Arial, sans-serif;
        font-size: 13px;
        padding: 9px 16px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #fff;
        cursor: pointer;
        color: var(--ink);
      }
      .nav-buttons button:hover {
        background: #f1e9d8;
      }
      .nav-buttons button:disabled {
        opacity: 0.35;
        cursor: default;
      }

      /* Dashboard */
      .stats-grid {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-bottom: 22px;
      }
      .stat-box {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 16px 20px;
        min-width: 140px;
        flex: 1;
      }
      .stat-box .num {
        font-size: 28px;
        color: var(--accent);
        font-weight: bold;
      }
      .stat-box .lab {
        font-size: 12px;
        color: var(--ink-soft);
        font-family: Arial, sans-serif;
        margin-top: 2px;
      }
      .chapter-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 10px;
      }
      .chapter-tile {
        border: 1px solid var(--line);
        background: var(--panel);
        border-radius: 8px;
        padding: 10px 12px;
        cursor: pointer;
        font-family: Arial, sans-serif;
      }
      .chapter-tile:hover {
        border-color: var(--accent-soft);
      }
      .chapter-tile.done {
        background: #eef4ec;
        border-color: #cfe0cc;
      }
      .chapter-tile .num {
        font-size: 11px;
        color: var(--ink-soft);
      }
      .chapter-tile .title {
        font-size: 13px;
        margin-top: 2px;
        line-height: 1.3;
      }
      .howto {
        font-size: 14px;
        line-height: 1.7;
        color: var(--ink-soft);
      }
      .glossary-item {
        margin-bottom: 12px;
      }
      .glossary-item .term {
        color: var(--accent);
        font-weight: bold;
        font-size: 14px;
      }
      table.caste-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
        font-family: Arial, sans-serif;
      }
      table.caste-table th,
      table.caste-table td {
        border: 1px solid var(--line);
        padding: 8px 10px;
        text-align: left;
      }
      table.caste-table th {
        background: #f1e9d8;
      }
      .quote-example {
        border-left: 3px solid var(--accent-soft);
        padding-left: 12px;
        margin-bottom: 14px;
        font-size: 14px;
        color: var(--ink-soft);
      }
      .quote-example .q {
        font-style: italic;
        color: var(--ink);
        font-size: 15px;
      }
      .char-card {
        margin-bottom: 20px;
      }
      .char-card .intro {
        font-size: 13.5px;
        color: var(--ink-soft);
        margin-bottom: 8px;
      }
      .char-card .chap-tag {
        font-size: 11px;
        color: #a0906f;
        font-family: Arial, sans-serif;
        margin-bottom: 8px;
        display: inline-block;
      }
      @media (max-width: 760px) {
        #app {
          flex-direction: column;
        }
        #sidebar {
          position: relative;
          height: auto;
          width: 100%;
        }
        #content {
          padding: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <nav id="sidebar">
        <h1>Brave New World</h1>
        <p class="subtitle">Your reading companion</p>
        <div class="progress-wrap">
          <div class="progress-bar-outer">
            <div class="progress-bar-inner" id="progress-bar" style="width: 0%"></div>
          </div>
          <div class="progress-label" id="progress-label">0 / 18 chapters</div>
        </div>
        <button class="nav-btn" data-view="dashboard">📖 Dashboard</button>
        <button class="nav-btn" data-view="reference">🔍 Quick reference</button>
        <div class="nav-section-title">Chapters</div>
        <div id="chapter-nav"></div>
        <div class="nav-section-title">My revision material</div>
        <button class="nav-btn" data-view="quotes">📝 My quotes</button>
        <button class="nav-btn" data-view="vocab">📚 My vocabulary</button>
        <button class="nav-btn" data-view="characters">👥 Character tracker</button>
        <div class="footer-btns">
          <button id="export-btn">⬇ Export my notes</button>
          <button id="import-btn">⬆ Import notes</button>
          <input type="file" id="import-file" accept="application/json" style="display: none" />
          <div id="save-indicator"></div>
        </div>
      </nav>
      <main id="content"></main>
    </div>

    <script>
      /* ---------------- DATA ---------------- */

      const chapterData = [
        {
          num: 1,
          title: "The Hatchery and Conditioning Centre",
          recap:
            "You're taken on a tour of the Central London Hatchery, where humans are grown in bottles, sorted into castes from Alpha to Epsilon, and shaped before birth by Bokanovsky's Process. There's no personal conflict yet — this chapter is world-building, almost like a guided tour.",
          themes: ["Technology", "Social stability", "Caste system", "Dehumanisation", "Fordism"],
          characters: ["The Director", "Henry Foster", "Lenina Crowne"],
          concepts: [
            {
              term: "Bokanovsky's Process",
              explain:
                "One fertilised egg is treated so it splits into up to 96 identical embryos. This is how the lower castes (Gamma, Delta, Epsilon) are mass-produced as identical 'twins' — it's cheaper and it makes those groups easier to manage because they're all the same.",
            },
            {
              term: "Decanting",
              explain:
                "This society doesn't say a baby is 'born' — it's 'decanted', meaning taken out of its bottle. There are no mothers here; every human starts life in a bottle on a factory conveyor belt.",
            },
            {
              term: "Caste predestination",
              explain:
                "Long before 'decanting', embryos are treated with different chemicals and oxygen levels depending on which caste (Alpha to Epsilon) they're destined for. Your future social class is decided while you're still in the bottle, not earned later.",
            },
            {
              term: "'A.F.' (the Ford calendar)",
              explain:
                "Time is counted from Henry Ford's birth ('After Ford') instead of from a religious calendar. Ford, the inventor of the assembly line, is treated almost like a god — a first hint that mass production has replaced religion in this world.",
            },
          ],
          questions: [
            {
              label:
                "Which detail from the Hatchery tour shocked or surprised you the most, and what does it show about what this society values?",
              hint: "The scene suggests that... / Huxley uses irony to make the reader question...",
            },
            {
              label:
                "This chapter reads more like a factory tour than a story — no real 'main character' yet. How did that style make you feel as a reader?",
              hint: "The effect on me was...",
            },
            {
              label: "Personal opinion: what stood out to you most, and why?",
              hint: "What I found most striking was...",
            },
          ],
        },
        {
          num: 2,
          title: "Learning to Obey: Infant Conditioning",
          recap:
            "The Director shows how infants are conditioned to fear books and flowers using noise and electric shocks, and explains hypnopaedia — sleep-teaching that repeats moral slogans until people believe them automatically.",
          themes: ["Conditioning", "Education as control", "Consumerism", "Fear of nature"],
          characters: ["The Director", "students on the tour"],
          concepts: [
            {
              term: "Hypnopaedia (sleep-teaching)",
              explain:
                "Recorded sentences are played to children thousands of times while they sleep. They never consciously 'learn' them — the phrases just become things they feel are true, without ever thinking about why. It's belief installed as a habit, not as a reasoned idea.",
            },
            {
              term: "Neo-Pavlovian conditioning",
              explain:
                "Named after Pavlov's dogs (who learned to associate a bell with food). Here, babies are shown books and flowers at the same time as loud noises and electric shocks, so their bodies learn to panic around them — pure physical fear, with no 'thinking' involved.",
            },
            {
              term: "Why nature and books are feared",
              explain:
                "It's economic: enjoying a flower or reading a book is free and doesn't require buying transport or gadgets. A society built on constant consumption can't allow people to enjoy things that cost nothing.",
            },
          ],
          questions: [
            {
              label:
                "How does conditioning infants let the World State control people without needing violence or punishment later on?",
              hint: "The scene suggests that...",
            },
            {
              label:
                "The narrator describes this cruelty calmly, like normal science. What effect did that flat, clinical tone have on you?",
              hint: "Huxley uses irony to make the reader question...",
            },
            {
              label:
                "Personal opinion: do you think 'conditioning' and 'education' are really different here — or just the same thing with a nicer name?",
              hint: "I would not describe this as simple education because...",
            },
          ],
        },
        {
          num: 3,
          title: "The Ideology of the World State",
          recap:
            "In a chapter that jumps rapidly between scenes, Mustapha Mond lectures on history, family, sexuality and soma, while Lenina talks with Fanny and Bernard reacts angrily to gossip about Lenina. Bernard emerges as an insecure outsider.",
          themes: ["Stability", "Consumerism", "Sexuality", "History", "Soma", "Alienation"],
          characters: ["Mustapha Mond", "Bernard Marx", "Lenina Crowne", "Fanny Crowne"],
          concepts: [
            {
              term: "Why the chapter feels confusing on purpose",
              explain:
                "Huxley cuts between three conversations without warning — no 'meanwhile' or scene break markers. This is deliberate: it makes you feel the same information-overload the citizens live in. Tip: when the topic suddenly shifts mid-page, that's a new scene starting, not a mistake.",
            },
            {
              term: "Why family and history were abolished",
              explain:
                "Mond explains that the old world's families created intense feelings — love, jealousy, grief — which made people unstable and hard to control. Removing biological family (and monogamy) removes those intense private loyalties.",
            },
            {
              term: "Soma (first full introduction)",
              explain:
                "A drug with 'all of the advantages of Christianity and alcohol, none of their defects' — it removes bad feelings instantly with no hangover (officially). Citizens take it for anything from mild boredom to real grief.",
            },
          ],
          questions: [
            {
              label:
                "This chapter cuts quickly between Mond's lecture, Lenina and Fanny's chat, and Bernard's anger. What mood does this fast cross-cutting create for you as a reader?",
              hint: "The contrast between ... and ... shows...",
            },
            {
              label: "At first, Bernard seems..., but by the end of the chapter...",
              hint: "Finish this sentence in your own words.",
            },
            {
              label:
                "What did Mond's comments about history, family and soma tell you about what the World State is afraid of?",
              hint: "The scene suggests that...",
            },
          ],
        },
        {
          num: 4,
          title: "Bernard, Lenina and Helmholtz",
          recap:
            "Lenina publicly and enthusiastically accepts Bernard's invitation to the Reservation, embarrassing him — he wanted something more private and serious. Bernard then meets Helmholtz Watson, another Alpha who senses something missing in his life.",
          themes: ["Alienation", "Individuality", "Friendship", "Social performance"],
          characters: ["Bernard Marx", "Lenina Crowne", "Helmholtz Watson"],
          concepts: [
            {
              term: "'Pneumatic'",
              explain:
                "A word used repeatedly to describe Lenina's body — it literally means 'filled with air', like a cushion. Men use it as a compliment. Notice how it talks about a person like a product, not a human being — that's Huxley's point.",
            },
            {
              term: "Unwritten Alpha social codes",
              explain:
                "Even at the very top caste, there are strict unspoken rules: date casually, never want just one person for long, never show strong emotion. Bernard is criticised not for breaking laws, but for breaking these invisible social habits.",
            },
          ],
          questions: [
            {
              label:
                "How does Lenina's reaction to the invitation reveal the gap between how she and Bernard see relationships?",
              hint: "This relationship is important because...",
            },
            {
              label:
                "Helmholtz seems stronger and more sincere than Bernard right from this first meeting. What specific detail gives you that impression?",
              hint: "This character represents...",
            },
            {
              label: "Personal opinion: which character do you relate to more so far, Bernard or Helmholtz, and why?",
              hint: "What I found most striking was...",
            },
          ],
        },
        {
          num: 5,
          title: "Soma, Games and the Solidarity Service",
          recap:
            "Henry and Lenina spend a soma-fuelled evening playing Obstacle Golf. Meanwhile Bernard attends a Solidarity Service, a ritual meant to create group unity, but he can't lose himself in it the way everyone else seems to.",
          themes: ["Soma", "False religion", "Mass entertainment", "Loneliness"],
          characters: ["Lenina Crowne", "Henry Foster", "Bernard Marx"],
          concepts: [
            {
              term: "The Solidarity Service",
              explain:
                "A parody of a church service: twelve people sit in a circle, pass round soma tablets, sing hymns to 'Ford' and work themselves up until they're meant to feel merged into a 'Greater Being'. It copies the structure of religion (ritual, community, ecstasy) but empties out the meaning.",
            },
            {
              term: "Obstacle Golf",
              explain:
                "A small but telling detail — new games in this society are deliberately designed to need lots of expensive equipment and travel. Even 'fun' exists to keep people consuming, not just to be enjoyable.",
            },
          ],
          questions: [
            {
              label:
                "Compare Lenina and Henry's evening with Bernard's experience at the Solidarity Service. What does each reveal about how 'happiness' works in this society?",
              hint: "The contrast between ... and ... shows...",
            },
            {
              label:
                "Huxley uses irony to make the reader question the Solidarity Service. Where exactly do you see that irony?",
              hint: "Look at the ritual's structure versus what it's supposed to achieve.",
            },
            {
              label:
                "Personal opinion: did the Solidarity Service remind you of any real event, ritual or trend you know?",
              hint: "For a modern reader, this is relevant because...",
            },
          ],
        },
        {
          num: 6,
          title: "Bernard's Growing Discontent",
          recap:
            "Bernard dislikes the shallow pleasures Lenina enjoys and wants something more intense. He gets permission to visit the Reservation. The Director recalls losing a woman there years ago, then threatens to exile Bernard to Iceland for his 'unorthodox' behaviour.",
          themes: ["Freedom", "Fear of exile", "Conformity", "Foreshadowing"],
          characters: ["Bernard Marx", "Lenina Crowne", "The Director"],
          concepts: [
            {
              term: "Exile to islands",
              explain:
                "The standard punishment for 'unorthodox' Alphas isn't prison — it's being sent to an island (like Iceland). It's framed purely as punishment here; keep this in mind, because how different characters react to this threat later says a lot about them.",
            },
          ],
          questions: [
            {
              label:
                "What do you think the Director's story about 'losing' a woman on the Reservation years ago might hint at? (It's fine if you're only guessing.)",
              hint: "The scene suggests that...",
            },
            {
              label:
                "Bernard seems braver for a moment but is also afraid of punishment. What specific detail shows both sides of him?",
              hint: "At first, this character seems..., but later...",
            },
            {
              label:
                "Personal opinion: what would you have done in Bernard's position, facing exile for being 'different'?",
              hint: "What I found most striking was...",
            },
          ],
        },
        {
          num: 7,
          title: "Arrival at the Savage Reservation",
          recap:
            "Bernard and Lenina reach the Reservation and are shocked by poverty, old age, illness and religion. They meet Linda, a Beta who was lost there years ago, and her son John, who was born naturally.",
          themes: ["Civilisation vs savagery", "Motherhood", "Shame", "Cultural conflict"],
          characters: ["Bernard Marx", "Lenina Crowne", "Linda", "John"],
          concepts: [
            {
              term: "The Savage Reservation",
              explain:
                "A fenced-off area kept outside World State control, where the 'old' way of life (families, religion, ageing, disease, birth) still exists — almost like a controlled human zoo that Alphas visit with a special permit.",
            },
            {
              term: "Real-world inspiration",
              explain:
                "Huxley based the Reservation loosely on Native American pueblo cultures he had read about and visited. It's a fictional, exaggerated version — useful context for the exam, but not a realistic portrayal of any real culture.",
            },
          ],
          questions: [
            {
              label:
                "The scene suggests that neither London nor the Reservation is a simple paradise. What contrasts between the two worlds stood out to you here?",
              hint: "The contrast between ... and ... shows...",
            },
            {
              label: "At first, Linda and John seem..., but as you learn more about them...",
              hint: "Finish this sentence about your first impression.",
            },

      function defaultState() {
        const chapters = {};

        return { chapters, charNotes, currentView: "dashboard" };

      let state = loadState();

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return defaultState();
          const parsed = JSON.parse(raw);
          const base = defaultState();
          // merge, so new fields added later don't break old saves
          Object.keys(base.chapters).forEach((k) => {
            if (parsed.chapters && parsed.chapters[k]) {
              base.chapters[k] = Object.assign(base.chapters[k], parsed.chapters[k]);
            }
          });
          if (parsed.charNotes) {
            Object.keys(base.charNotes).forEach((k) => {
              if (parsed.charNotes[k] !== undefined) base.charNotes[k] = parsed.charNotes[k];
            });
          }
          if (parsed.currentView) base.currentView = parsed.currentView;
          return base;
        } catch (e) {
          return defaultState();
        }
      }

          clearTimeout(saveTimer);
          saveTimer = setTimeout(() => (ind.textContent = ""), 1500);
        }
        updateProgress();
      }

      function updateProgress() {
        const total = chapterData.length;
        const done = Object.values(state.chapters).filter((c) => c.done).length;
        const pct = Math.round((done / total) * 100);
        const bar = document.getElementById("progress-bar");
        const lab = document.getElementById("progress-label");
        if (bar) bar.style.width = pct + "%";
        if (lab) lab.textContent = done + " / " + total + " chapters";
        document.querySelectorAll(".nav-btn[data-chapter]").forEach((btn) => {
          const n = btn.getAttribute("data-chapter");
          const tick = btn.querySelector(".tick");
          if (tick) tick.textContent = state.chapters[n].done ? "✓" : "";
        });
      }

        ${chapterData
          .map(
            (c) => `
          <div class="chapter-tile ${state.chapters[c.num].done ? "done" : ""}" data-goto="chapter-${c.num}">
            <div class="num">Chapter ${c.num}${state.chapters[c.num].done ? " ✓" : ""}</div>
            <div class="title">${c.title}</div>
          </div>
        `,
          )
          .join("")}
      </div>
    </div>
  `;
        content.querySelectorAll("[data-goto]").forEach((el) => {
          el.addEventListener("click", () => navigate(el.getAttribute("data-goto")));
        });
      }

      function renderReference() {
        content.innerHTML = `
    <h2 class="page-title">Quick reference</h2>
    <p class="page-sub">Keep this open in a tab while you read — no plot spoilers here.</p>

    <div class="card">
      <h3>Caste system</h3>
      <table class="caste-table">
        <tr><th>Caste</th><th>Colour</th><th>Meaning</th></tr>
        ${casteTable.map((c) => `<tr><td>${c.caste}</td><td>${c.colour}</td><td>${c.meaning}</td></tr>`).join("")}
      </table>
    </div>

    <div class="card">
      <h3>Themes to watch for</h3>
      ${themeGlossary
        .map(
          (t) => `
        <div class="glossary-item">
          <div class="term">${t.term}</div>
          <div>${t.note}</div>
        </div>
      `,
        )
        .join("")}
    </div>

    <div class="card">
      <h3>Tricky words &amp; names glossary</h3>
      <p style="font-size:13px; color:var(--ink-soft); margin-top:-4px;">The invented vocabulary is part of what makes this book hard. Look words up here any time — this is separate from your own personal vocabulary list.</p>
      ${hardWords
        .map(
          (t) => `
        <div class="glossary-item">
          <div class="term">${t.term}</div>
          <div>${t.note}</div>
        </div>
      `,
        )
        .join("")}
    </div>

    <div class="card">
      <h3>Exam-ready quotes bank <span style="font-size:11px; color:#a0906f; font-family:Arial,sans-serif;">(a couple are from later chapters — skip if you'd rather avoid it)</span></h3>
      ${examQuotes
        .map(
          (q) => `
        <div class="quote-example">
          <div class="q">"${q.q}"</div>
          <div><strong>Scene:</strong> ${q.scene}</div>
          <div><strong>Use it for:</strong> ${q.use}</div>
        </div>
      `,
        )
        .join("")}
    </div>
  `;
      }

      function renderChapter(n) {
        const c = chapterData.find((x) => x.num === n);
        const s = state.chapters[n];

        content.innerHTML = `
    <h2 class="page-title">Chapter ${c.num}: ${c.title}</h2>
    <p class="page-sub">Read the chapter first — then come back here.</p>

    <details class="recap">
      <summary>🔎 Check your understanding (click to reveal)</summary>
      <p>${c.recap}</p>
    </details>

    <div class="card">
      <h3>Themes in this chapter</h3>
      <div class="tags">${c.themes.map((t) => `<span class="tag">${t}</span>`).join("")}</div>
      <h3>Characters in this chapter</h3>
      <div class="tags">${c.characters.map((t) => `<span class="tag char">${t}</span>`).join("")}</div>
    </div>

    <div class="card">
      <h3>🧩 Explained: tricky bits in this chapter</h3>
      ${
        (c.concepts || [])
          .map(
            (co) => `
        <div class="glossary-item">
          <div class="term">${co.term}</div>
          <div>${co.explain}</div>
        </div>
      `,
          )
          .join("") ||
        `<p style="color:#a0906f; font-size:13px;">Nothing extra to explain here — this chapter is fairly self-contained.</p>`
      }
    </div>

    <div class="card">
      <h3>💭 Reflect</h3>
      ${c.questions
        .map(
          (q, i) => `
        <div class="q-block">
          <label>${i + 1}. ${q.label}</label>
          <div class="q-hint">Sentence starter: ${q.hint}</div>
          <textarea data-answer="${i}">${s.answers[i] || ""}</textarea>
        </div>
      `,
        )
        .join("")}
    </div>

    <div class="card">
      <h3>📝 Important quotes</h3>
      <div id="quote-list"></div>
      <button class="small-btn" id="add-quote">+ Add a quote</button>
    </div>

    <div class="card">
      <h3>📚 New words</h3>
      <div id="vocab-list"></div>
      <button class="small-btn" id="add-vocab">+ Add a word</button>
    </div>

    <div class="chapter-footer">
      <label class="done-toggle">
        <input type="checkbox" id="done-check" ${s.done ? "checked" : ""}>
        Mark Chapter ${n} as read &amp; reflected
      </label>
      <div class="nav-buttons">
        <button id="prev-btn" ${n <= 1 ? "disabled" : ""}>← Chapter ${n - 1}</button>
        <button id="next-btn" ${n >= 18 ? "disabled" : ""}>Chapter ${n + 1} →</button>
      </div>
    </div>
  `;

        // answers
        content.querySelectorAll("[data-answer]").forEach((ta) => {
          ta.addEventListener("input", () => {
            s.answers[parseInt(ta.getAttribute("data-answer"))] = ta.value;
            saveState();
          });
        });

        // quotes
        function renderQuoteList() {
          const wrap = document.getElementById("quote-list");
          wrap.innerHTML =
            s.quotes
              .map(
                (q, i) => `
      <div class="quote-row" data-qi="${i}">
        <textarea placeholder="Quote text...">${q.text}</textarea>
        <div class="meta-row">
          <input type="text" placeholder="Page / location (optional)" data-field="page" value="${q.page || ""}">
          <input type="text" placeholder="Why does it matter?" data-field="note" value="${q.note || ""}">
          <button class="remove-btn" data-remove="${i}">✕</button>
        </div>
      </div>
    `,
              )
              .join("") || `<p style="color:#a0906f; font-size:13px;">No quotes saved yet.</p>`;

          wrap.querySelectorAll(".quote-row").forEach((row) => {
            const i = parseInt(row.getAttribute("data-qi"));
            row.querySelector("textarea").addEventListener("input", (e) => {
              s.quotes[i].text = e.target.value;
              saveState();
            });
            row.querySelectorAll("input[data-field]").forEach((inp) => {
              inp.addEventListener("input", (e) => {
                s.quotes[i][inp.getAttribute("data-field")] = e.target.value;
                saveState();
              });
            });
          });
          wrap.querySelectorAll("[data-remove]").forEach((btn) => {
            btn.addEventListener("click", () => {
              s.quotes.splice(parseInt(btn.getAttribute("data-remove")), 1);
              saveState();
              renderQuoteList();
            });
          });
        }
        renderQuoteList();
        document.getElementById("add-quote").addEventListener("click", () => {
          s.quotes.push({ text: "", page: "", note: "" });
          saveState();
          renderQuoteList();
        });

        // vocab
        function renderVocabList() {
          const wrap = document.getElementById("vocab-list");
          wrap.innerHTML =
            s.vocab
              .map(
                (v, i) => `
      <div class="vocab-row" data-vi="${i}">
        <input type="text" placeholder="Word / phrase" data-field="word" value="${v.word || ""}">
        <input type="text" placeholder="Meaning / translation" data-field="meaning" value="${v.meaning || ""}">
        <button class="remove-btn" data-remove="${i}">✕</button>
      </div>
    `,
              )
              .join("") || `<p style="color:#a0906f; font-size:13px;">No words saved yet.</p>`;

          wrap.querySelectorAll(".vocab-row").forEach((row) => {
            const i = parseInt(row.getAttribute("data-vi"));
            row.querySelectorAll("input[data-field]").forEach((inp) => {
              inp.addEventListener("input", (e) => {
                s.vocab[i][inp.getAttribute("data-field")] = e.target.value;
                saveState();
              });
            });
          });
          wrap.querySelectorAll("[data-remove]").forEach((btn) => {
            btn.addEventListener("click", () => {
              s.vocab.splice(parseInt(btn.getAttribute("data-remove")), 1);
              saveState();
              renderVocabList();
            });
          });
        }
        renderVocabList();
        document.getElementById("add-vocab").addEventListener("click", () => {
          s.vocab.push({ word: "", meaning: "" });
          saveState();
          renderVocabList();
        });

        document.getElementById("done-check").addEventListener("change", (e) => {
          s.done = e.target.checked;
          saveState();
          updateProgress();
        });

        document.getElementById("prev-btn").addEventListener("click", () => navigate(`chapter-${n - 1}`));
        document.getElementById("next-btn").addEventListener("click", () => navigate(`chapter-${n + 1}`));
      }

      function renderQuotes() {
        let rows = [];
        chapterData.forEach((c) => {
          state.chapters[c.num].quotes.forEach((q) => {
            if (q.text && q.text.trim()) rows.push({ chapter: c.num, title: c.title, ...q });
          });
        });
        content.innerHTML = `
    <h2 class="page-title">My quotes</h2>
    <p class="page-sub">Everything you've saved, in one place — ready for oral exam evidence.</p>
    ${
      rows.length === 0
        ? `<div class="card"><p style="color:var(--ink-soft)">No quotes yet. Add some from inside a chapter page.</p></div>`
        : rows
            .map(
              (r) => `
        <div class="card">
          <div style="font-size:11px; color:#a0906f; font-family:Arial,sans-serif; margin-bottom:6px;">Chapter ${r.chapter} — ${r.title}</div>
          <div class="quote-example"><div class="q">"${r.text}"</div>
          ${r.page ? `<div><strong>Page/location:</strong> ${r.page}</div>` : ""}
          ${r.note ? `<div><strong>Why it matters:</strong> ${r.note}</div>` : ""}
          </div>
        </div>
      `,
            )
            .join("")
    }
  `;
      }

      function renderVocab() {
        let rows = [];
        chapterData.forEach((c) => {
          state.chapters[c.num].vocab.forEach((v) => {
            if (v.word && v.word.trim()) rows.push({ chapter: c.num, ...v });
          });
        });
        content.innerHTML = `
    <h2 class="page-title">My vocabulary</h2>
    <p class="page-sub">Click a word to reveal its meaning — quick self-testing.</p>
    ${
      rows.length === 0
        ? `<div class="card"><p style="color:var(--ink-soft)">No words yet. Add some from inside a chapter page.</p></div>`
        : `<div class="card"><table class="caste-table">
        <tr><th>Chapter</th><th>Word</th><th>Meaning (click to reveal)</th></tr>
        ${rows
          .map(
            (r, i) => `
          <tr>
            <td>${r.chapter}</td>
            <td>${r.word}</td>
            <td><span class="vocab-reveal" data-i="${i}" style="cursor:pointer; color:#a0906f;">tap to reveal</span></td>
          </tr>
        `,
          )
          .join("")}
      </table></div>`
    }
  `;
        content.querySelectorAll(".vocab-reveal").forEach((el) => {
          el.addEventListener("click", () => {
            const i = parseInt(el.getAttribute("data-i"));
            el.textContent = rows[i].meaning || "(no meaning saved)";
            el.style.color = "var(--ink)";
            el.style.cursor = "default";
          });
        });
      }

      function renderCharacters() {
        content.innerHTML = `
    <h2 class="page-title">Character tracker</h2>
    <p class="page-sub">Update these notes as each character develops through the book.</p>
    ${characterList
      .map(
        (c) => `
      <div class="card char-card">
        <h3>${c.name}</h3>
        <span class="chap-tag">First appears: Chapter ${c.first}</span>
        <div class="intro">${c.intro}</div>
        <textarea data-char="${c.name}" placeholder="Your notes on how this character develops...">${state.charNotes[c.name] || ""}</textarea>
      </div>
    `,
      )
      .join("")}
  `;
        content.querySelectorAll("[data-char]").forEach((ta) => {
          ta.addEventListener("input", (e) => {
            state.charNotes[ta.getAttribute("data-char")] = e.target.value;
            saveState();
          });
        });
      }

      /* ---------------- SIDEBAR NAV BUILD ---------------- */

      const chapterNavWrap = document.getElementById("chapter-nav");
      chapterData.forEach((c) => {
        const btn = document.createElement("button");
        btn.className = "nav-btn";
        btn.setAttribute("data-chapter", c.num);
        btn.innerHTML = `<span>Ch. ${c.num}: ${c.title.length > 22 ? c.title.slice(0, 20) + "…" : c.title}</span><span class="tick"></span>`;
        btn.addEventListener("click", () => navigate(`chapter-${c.num}`));
        chapterNavWrap.appendChild(btn);
      });

      document.querySelectorAll(".nav-btn[data-view]").forEach((btn) => {
        btn.addEventListener("click", () => navigate(btn.getAttribute("data-view")));
      });

      /* ---------------- EXPORT / IMPORT ---------------- */

      document.getElementById("export-btn").addEventListener("click", () => {
        const blob = new Blob([JSON.stringify(state, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "brave-new-world-notes.json";
        a.click();
        URL.revokeObjectURL(url);
      });

      document.getElementById("import-btn").addEventListener("click", () => {
        document.getElementById("import-file").click();
      });
      document.getElementById("import-file").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const parsed = JSON.parse(evt.target.result);
            const base = defaultState();
            Object.keys(base.chapters).forEach((k) => {
              if (parsed.chapters && parsed.chapters[k])
                base.chapters[k] = Object.assign(base.chapters[k], parsed.chapters[k]);
            });
            if (parsed.charNotes) {
              Object.keys(base.charNotes).forEach((k) => {
                if (parsed.charNotes[k] !== undefined) base.charNotes[k] = parsed.charNotes[k];
              });
            }
            state = base;
            saveState();
            render(state.currentView || "dashboard");
            alert("Notes imported successfully.");
          } catch (err) {
            alert("Could not read this file. Make sure it is a JSON export from this tool.");
          }
        };
        reader.readAsText(file);
      });

      /* ---------------- INIT ---------------- */
      updateProgress();
      render(state.currentView || "dashboard");
    </script>
  </body>
</html>
